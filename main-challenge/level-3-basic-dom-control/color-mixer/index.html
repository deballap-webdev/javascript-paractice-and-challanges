<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JavaScript Practice</title>
    <link rel="stylesheet" href="style.css" />
    <script src="main.js" defer></script>
  </head>
  <body>
    <h1>My Page</h1>
    <section id="section">
      <div class="slider-container">
        <label class="section__slider-label" for="red"> </label>
        <input
          class="section__slider"
          type="range"
          name="red"
          id="red"
          min="0"
          max="255"
        />
      </div>

      <div class="slider-container">
        <label class="section__slider-label" for="green"></label>
        <input
          class="section__slider"
          type="range"
          name="green"
          id="green"
          min="0"
          max="255"
        />
      </div>

      <div class="slider-container">
        <label class="section__slider-label" for="blue"></label>
        <input
          class="section__slider"
          type="range"
          name="blue"
          id="blue"
          min="0"
          max="255"
        />
      </div>

      <div class="slider-container">
        <label class="section__slider-label" for="transparent"></label>
        <input
          class="section__slider"
          type="range"
          name="transparent"
          id="transparent"
          min="0"
          max="100"
        />
      </div>

      <div class="color-box"></div>
    </section>
  </body>
</html>
